apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: laxmireddy870113/backend:latest
          ports:

            - containerPort: 5000
